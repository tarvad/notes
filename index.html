<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Portal - Secure Node Login</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0c0f12; color: #00ff66; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { border: 1px solid #00ff66; padding: 30px; border-radius: 5px; background: #11161b; box-shadow: 0 0 15px rgba(0,255,102,0.2); width: 320px; }
        h2 { text-align: center; margin-top: 0; font-size: 1.2rem; letter-spacing: 2px; }
        label { display: block; margin: 15px 0 5px; font-size: 0.8rem; }
        input { width: 100%; padding: 8px; background: #0c0f12; border: 1px solid #00ff66; color: #00ff66; box-sizing: border-box; }
        button { width: 100%; padding: 10px; margin-top: 20px; background: #00ff66; color: #0c0f12; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #00cc55; }
        .error-msg { color: #ff3333; font-size: 0.75rem; text-align: center; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>[ NODE_ACCESS_v4 ]</h2>
        <p style="font-size: 0.7rem; text-align: center; color: #888;">Authorized Personnel Only</p>
        
        <label>Operator ID:</label>
        <input type="text" placeholder="e.g., admin_01">
        
        <label>Security Token:</label>
        <input type="password" placeholder="••••••••">
        
        <!-- This button clears the input and displays a fake error message -->
        <button onclick="document.querySelector('.error-msg').style.display='block';">AUTHENTICATE</button>
        
        <div class="error-msg">⚠️ ERROR: Authentication timeout. Request rejected by gateway.</div>
    </div>

</body>
</html>
