<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Portal - Secure Node Login</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0c0f12; color: #00ff66; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { border: 1px solid #00ff66; padding: 30px; border-radius: 5px; background: #11161b; box-shadow: 0 0 15px rgba(0,255,102,0.2); width: 320px; transition: all 0.3s ease; }
        h2 { text-align: center; margin-top: 0; font-size: 1.2rem; letter-spacing: 2px; }
        label { display: block; margin: 15px 0 5px; font-size: 0.8rem; }
        input { width: 100%; padding: 8px; background: #0c0f12; border: 1px solid #00ff66; color: #00ff66; box-sizing: border-box; }
        button { width: 100%; padding: 10px; margin-top: 20px; background: #00ff66; color: #0c0c12; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #00cc55; }
        .error-msg { color: #ff3333; font-size: 0.75rem; text-align: center; margin-top: 15px; font-weight: bold; line-height: 1.4; display: none; }
        .loading-text { display: none; text-align: center; color: #00ff66; font-size: 0.8rem; margin-top: 15px; font-weight: bold; }
        
        /* Lockout Styling overrides */
        .locked { border-color: #ff3333 !important; box-shadow: 0 0 25px rgba(255,51,51,0.4) !important; background: #161111 !important; color: #ff3333 !important; }
        .locked h2 { animation: blink 1s infinite; }
        .locked input { border-color: #552222; color: #552222; cursor: not-allowed; }
        .locked button { background: #331111; color: #552222; cursor: not-allowed; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="login-box" id="terminalBox">
        <h2 id="boxHeader">[ NODE_ACCESS_v4 ]</h2>
        <p id="boxSub" style="font-size: 0.7rem; text-align: center; color: #888;">Authorized Personnel Only</p>
        
        <div id="formFields">
            <label>Operator ID:</label>
            <!-- Added playClick() on input events -->
            <input type="text" id="username" placeholder="e.g., admin_01" oninput="playClick()">
            <label>Security Token:</label>
            <input type="password" id="securityToken" placeholder="••••••••" oninput="playClick()" onkeydown="if(event.key==='Enter') executeLogin()">
            <button onclick="executeLogin()" id="authBtn">AUTHENTICATE</button>
        </div>
        
        <div class="loading-text" id="loadingBlock">CONNECTING TO GATEWAY...</div>
        
        <div class="error-msg" id="errorBlock">
            ⚠ ERROR: Invalid credentials.<br>
            You have <span id="attempts">3</span> authentication attempts remaining.
        </div>
    </div>

    <script>
        // Web Audio API Audio Synthesizer Engine
        var audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Simulates a clean mechanical terminal keyclick
        function playClick() {
            initAudio();
            if (!audioCtx) return;

            var osc = audioCtx.createOscillator();
            var gain = audioCtx.createGain();
            
            osc.type = 'triangle';
            // Slight random pitch fluctuation makes it sound organic
            osc.frequency.setValueAtTime(600 + Math.random() * 200, audioCtx.currentTime);
            
            // Short decay envelope for a punchy click sound
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.04);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.04);
        }

        // Simulates a system warning buzzer / low synth warning
        function playErrorSound() {
            initAudio();
            if (!audioCtx) return;

            var osc = audioCtx.createOscillator();
            var gain = audioCtx.createGain();
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }

        // Execution Logic
        if (sessionStorage.getItem('login_attempts') === null) {
            sessionStorage.setItem('login_attempts', '3');
        }

        var attemptsLeft = parseInt(sessionStorage.getItem('login_attempts'));
        var terminalBox = document.getElementById('terminalBox');
        var errorBlock = document.getElementById('errorBlock');
        var loadingBlock = document.getElementById('loadingBlock');
        var formFields = document.getElementById('formFields');

        if (attemptsLeft <= 0 || sessionStorage.getItem('lockout_active')) {
            triggerLockout();
        }

        function triggerLockout() {
            sessionStorage.setItem('lockout_active', 'true');
            sessionStorage.setItem('login_attempts', '0');
            terminalBox.classList.add('locked');
            document.getElementById('boxHeader').textContent = "[ TERMINAL_LOCKED ]";
            document.getElementById('boxSub').textContent = "SYSTEM LOCKOUT ACTIVE";
            formFields.style.display = "none";
            loadingBlock.style.display = "none";
            errorBlock.innerHTML = "⚠ CRITICAL SECURITY THREAT OVERRIDE.<br>Terminal network signature blacklisted.<br>Contact system administrator.";
            errorBlock.style.display = "block";
        }

        function executeLogin() {
            playClick(); // Click sound on authentication trigger
            if (sessionStorage.getItem('lockout_active')) return;

            var tokenInput = document.getElementById('securityToken').value.trim();
            var targetFolder = "paranoid"; 
            
            if (tokenInput === "") return;

            errorBlock.style.display = "none";
            loadingBlock.style.display = "block";
            
            var targetUrl = targetFolder + "/" + tokenInput + ".html";

            setTimeout(function() {
                fetch(targetUrl)
                .then(function(response) {
                    if (response.ok) {
                        return response.text();
                    } else {
                        throw new Error("404");
                    }
                })
                .then(function(htmlContent) {
                    document.open();
                    document.write(htmlContent);
                    document.close();
                })
                .catch(function(error) {
                    loadingBlock.style.display = "none";
                    handleFailure();
                });
            }, 1500); 
        }

        function handleFailure() {
            playErrorSound(); // Buzzes immediately when access is denied
            attemptsLeft--;
            sessionStorage.setItem('login_attempts', attemptsLeft);
            
            if (attemptsLeft <= 0) {
                triggerLockout();
                playErrorSound(); // Double down on lockout
            } else {
                document.getElementById('attempts').textContent = attemptsLeft;
                errorBlock.style.display = "block";
                document.getElementById('securityToken').value = "";
            }
        }
    </script>
</body>
</html>
