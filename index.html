<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Portal - Secure Node Login</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0c0f12; color: #00ff66; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { border: 1px solid #00ff66; padding: 30px; border-radius: 5px; background: #11161b; box-shadow: 0 0 15px rgba(0,255,102,0.2); width: 320px; }
        h2 { text-align: center; margin-top: 0; font-size: 1.2rem; letter-spacing: 2px; }
        label { display: block; margin: 15px 0 5px; font-size: 0.8rem; }
        input { width: 100%; padding: 8px; background: #0c0f12; border: 1px solid #00ff66; color: #00ff66; box-sizing: border-box; }
        button { width: 100%; padding: 10px; margin-top: 20px; background: #00ff66; color: #0c0c12; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #00cc55; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>[ NODE_ACCESS_v4 ]</h2>
        <p style="font-size: 0.7rem; text-align: center; color: #888;">Authorized Personnel Only</p>
        <label>Operator ID:</label>
        <input type="text" id="username" placeholder="e.g., admin_01">
        <label>Security Token:</label>
        <input type="password" id="securityToken" placeholder="••••••••" onkeydown="if(event.key==='Enter') executeLogin()">
        <button onclick="executeLogin()">AUTHENTICATE</button>
    </div>
    <script>
        // Check if user is session-locked out
        if (sessionStorage.getItem('lockout_active')) {
            // Find the repository root dynamically by getting the current origin + repository pathname
            var repoPath = window.location.pathname.split('/')[1];
            window.location.href = window.location.origin + '/' + repoPath + '/404.html';
        } else {
            sessionStorage.setItem('login_attempts', '3');
        }

        function executeLogin() {
            var tokenInput = document.getElementById('securityToken').value.trim();
            var targetFolder = "vault-node-xyz"; 
            
            if (tokenInput !== "") {
                sessionStorage.setItem('login_attempts', '2');
                
                // Get the base repository path to handle GitHub Pages subfolders perfectly
                var pathSegments = window.location.pathname.split('/');
                var repoName = pathSegments[1]; 
                
                // Construct path safely: ://yourdomain.com
                window.location.href = window.location.origin + '/' + repoName + '/' + targetFolder + '/' + tokenInput + '.html';
            }
        }
    </script>
</body>
</html>
