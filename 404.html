<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Portal - Secure Node Login</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0c0f12; color: #00ff66; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { border: 1px solid #00ff66; padding: 30px; border-radius: 5px; background: #11161b; box-shadow: 0 0 15px rgba(0,255,102,0.2); width: 320px; transition: all 0.3s ease; }
        h2 { text-align: center; margin-top: 0; font-size: 1.2rem; letter-spacing: 2px; }
        label { display: block; margin: 15px 0 5px; font-size: 0.8rem; }
        input { width: 100%; padding: 8px; background: #0c0f12; border: 1px solid #00ff66; color: #00ff66; box-sizing: border-box; }
        button { width: 100%; padding: 10px; margin-top: 20px; background: #00ff66; color: #0c0c12; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #00cc55; }
        .error-msg { color: #ff3333; font-size: 0.75rem; text-align: center; margin-top: 15px; font-weight: bold; line-height: 1.4; }
        
        /* Lockout Styling overrides */
        .locked { border-color: #ff3333 !important; box-shadow: 0 0 25px rgba(255,51,51,0.4) !important; background: #161111 !important; color: #ff3333 !important; }
        .locked h2 { animation: blink 1s infinite; }
        .locked input { border-color: #552222; color: #552222; cursor: not-allowed; }
        .locked button { background: #331111; color: #552222; cursor: not-allowed; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div class="login-box" id="terminalBox">
        <h2 id="boxHeader">[ NODE_ACCESS_v4 ]</h2>
        <p id="boxSub" style="font-size: 0.7rem; text-align: center; color: #888;">Authorized Personnel Only</p>
        
        <div id="formFields">
            <label>Operator ID:</label>
            <input type="text" id="username" placeholder="e.g., admin_01">
            <label>Security Token:</label>
            <input type="password" id="securityToken" placeholder="••••••••" onkeydown="if(event.key==='Enter') executeLogin()">
            <button onclick="executeLogin()" id="authBtn">AUTHENTICATE</button>
        </div>
        
        <div class="error-msg" id="errorBlock">
            ⚠ ERROR: Invalid credentials.<br>
            You have <span id="attempts">2</span> authentication attempts remaining.
        </div>
    </div>

    <script>
        var attemptsLeft = sessionStorage.getItem('login_attempts');
        
        if (attemptsLeft === null) {
            attemptsLeft = 2; 
        } else {
            attemptsLeft = parseInt(attemptsLeft);
        }

        var terminalBox = document.getElementById('terminalBox');
        var errorBlock = document.getElementById('errorBlock');

        // Check if they are completely locked out
        if (attemptsLeft <= 0 || sessionStorage.getItem('lockout_active')) {
            sessionStorage.setItem('lockout_active', 'true');
            triggerLockout();
        } else {
            // Update the layout with how many remaining tries they have
            document.getElementById('attempts').textContent = attemptsLeft;
        }

        function triggerLockout() {
            terminalBox.classList.add('locked');
            document.getElementById('boxHeader').textContent = "[ TERMINAL_LOCKED ]";
            document.getElementById('boxSub').textContent = "SYSTEM LOCKOUT ACTIVE";
            
            // Disable inputs completely
            document.getElementById('username').disabled = true;
            document.getElementById('securityToken').disabled = true;
            document.getElementById('authBtn').disabled = true;
            
            errorBlock.innerHTML = "⚠ CRITICAL SECURITY THREAT OVERRIDE.<br>Terminal terminal signature blacklisted.<br>Contact system administrator.";
        }

        function executeLogin() {
            if (sessionStorage.getItem('lockout_active')) return;

            var tokenInput = document.getElementById('securityToken').value.trim();
            var targetFolder = "vault-node-xyz"; 
            
            if (tokenInput !== "") {
                // Drop down the counter by 1 before requesting the next file
                var nextAttempts = attemptsLeft - 1;
                sessionStorage.setItem('login_attempts', nextAttempts);
                
                // CRUCIAL: The "/" at the front resets the browser path context back to root!
                window.location.href = "/" + targetFolder + "/" + tokenInput + ".html";
            }
        }
    </script>
</body>
</html>
